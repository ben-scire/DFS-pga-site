name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static export
        run: npm run build:pages
        env:
          NEXT_PUBLIC_DFS_API_BASE_URL: ${{ secrets.NEXT_PUBLIC_DFS_API_BASE_URL }}
          NEXT_PUBLIC_DFS_CONTEST_ID: ${{ secrets.NEXT_PUBLIC_DFS_CONTEST_ID }}
          NEXT_PUBLIC_DFS_API_PATH: ${{ secrets.NEXT_PUBLIC_DFS_API_PATH }}
          NEXT_PUBLIC_DFS_STREAM_PATH: ${{ secrets.NEXT_PUBLIC_DFS_STREAM_PATH }}
          NEXT_PUBLIC_DFS_API_KEY: ${{ secrets.NEXT_PUBLIC_DFS_API_KEY }}
          NEXT_PUBLIC_DFS_API_KEY_HEADER: ${{ secrets.NEXT_PUBLIC_DFS_API_KEY_HEADER }}
          NEXT_PUBLIC_DFS_REFRESH_MS: ${{ secrets.NEXT_PUBLIC_DFS_REFRESH_MS }}
          NEXT_PUBLIC_USE_MOCK_FALLBACK: ${{ secrets.NEXT_PUBLIC_USE_MOCK_FALLBACK }}

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload static artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
